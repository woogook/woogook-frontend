apiVersion: 1

groups:
  - orgId: 1
    name: frontend-observability
    folder: Frontend Observability
    interval: 10s
    rules:
      - uid: frontend_browser_error_detected
        title: FrontendBrowserErrorDetected
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 120
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: sum(increase(woogook_frontend_browser_event_total{signal_type="browser_error"}[2m]))
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold
        noDataState: OK
        execErrState: Alerting
        for: 0s
        annotations:
          summary: Recent browser_error events detected in woogook-frontend local stack.
        labels:
          alertname: FrontendBrowserErrorDetected
          route: /synthetic/browser-error
          component: browser
          team: frontend-observability
      - uid: frontend_api_5xx_detected
        title: FrontendApi5xxDetected
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 120
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: sum(increase(woogook_frontend_request_total{status=~"5.."}[2m]))
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold
        noDataState: OK
        execErrState: Alerting
        for: 0s
        annotations:
          summary: Recent 5xx responses detected in woogook-frontend local stack.
        labels:
          alertname: FrontendApi5xxDetected
          route: observability/dev/fail
          component: next-api
          team: frontend-observability
