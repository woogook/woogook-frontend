global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets:
          - loki:3100

  - job_name: woogook-frontend
    metrics_path: /api/observability/metrics
    static_configs:
      - targets:
          - __FRONTEND_METRICS_TARGET__
