name: agents-harness-check

on:
  workflow_dispatch:
  # GitHub Actions 사용량 절감을 위해 자동 실행을 잠시 비활성화했다.
  # 필요 시 아래 trigger를 복원한다.
  # pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate agents harness
        run: python3 scripts/validate_agents_harness.py

      - name: Run agents harness tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'
