name: LLM Workflow
description: Codex/LLM 작업 기준 이슈
title: "[common] "
labels:
  - enhancement
body:
  - type: textarea
    id: background
    attributes:
      label: 배경
      description: 왜 이 작업이 필요한지 적습니다.
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: 목표
      description: 이번 작업의 완료 조건을 적습니다.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 범위
    validations:
      required: true
  - type: textarea
    id: non_scope
    attributes:
      label: 비범위
  - type: textarea
    id: verification
    attributes:
      label: 검증 계획
    validations:
      required: true
