name: Agent Task
description: 에이전트가 바로 작업을 시작할 수 있게 필요한 정보를 정리한다.
title: "[agent-task] "
body:
  - type: textarea
    id: background
    attributes:
      label: 배경
      description: 왜 이 작업이 필요한지 적는다.
      placeholder: 현재 상황과 문제 배경을 적는다.
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: 목표
      description: 이번 작업으로 달성하려는 결과를 적는다.
      placeholder: 원하는 결과와 성공 상태를 적는다.
    validations:
      required: true
  - type: dropdown
    id: domain
    attributes:
      label: 소유 도메인
      options:
        - common
        - assembly
        - local-election
        - local-council
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 범위
      description: 이번 작업에서 실제로 처리할 범위를 적는다.
      placeholder: 영향 범위와 관련 파일 또는 문서를 적는다.
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: 비범위
      description: 이번 작업에서 하지 않을 일을 적는다.
      placeholder: 제외할 범위가 없으면 `없음`이라고 적는다.
    validations:
      required: true
  - type: textarea
    id: checklist
    attributes:
      label: 작업 체크리스트
      description: 실행 단위를 Markdown 체크박스로 적는다.
      placeholder: |
        - [ ] 기준 이슈를 정한다.
        - [ ] 구현 또는 문서 수정을 진행한다.
        - [ ] 검증 결과를 남긴다.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: 검증
      description: 작업 완료 후 확인할 명령이나 방법을 적는다.
      placeholder: 명령 또는 수동 확인 절차를 적는다.
    validations:
      required: true
  - type: textarea
    id: docs-impact
    attributes:
      label: 문서 영향
      description: 문서 수정 여부와 예상 문서를 적는다.
      placeholder: 관련 문서 또는 영향 없음 사유를 적는다.
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: 참고 자료
      description: 관련 Issue, PR, 문서, 링크가 있으면 적는다.
      placeholder: 없으면 `없음`이라고 적는다.
    validations:
      required: true
